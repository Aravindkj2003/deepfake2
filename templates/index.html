<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Deepfake Detector</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #1f2937 0%, #111827 50%, #030712 100%);
      min-height: 100vh;
      padding: 28px;
    }

    .app-shell {
      max-width: 1100px;
      margin: 0 auto;
      color: #f3f4f6;
    }

    .hero {
      margin-bottom: 20px;
    }

    .title {
      margin: 0;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #e5e7eb;
    }

    .subtitle {
      color: #9ca3af;
      margin-top: 8px;
      margin-bottom: 0;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
    }

    .card {
      width: 100%;
      background: rgba(17, 24, 39, 0.88);
      border: 1px solid #374151;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
    }

    .card h3 {
      margin: 0 0 12px;
      color: #f9fafb;
      font-size: 18px;
    }

    .section {
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      background: rgba(31, 41, 55, 0.6);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      min-width: 240px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
      font-size: 14px;
    }

    input[type="text"]::placeholder {
      color: #6b7280;
    }

    input[type="file"] {
      font-size: 14px;
      color: #d1d5db;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(90deg, #06b6d4, #22c55e);
      color: #052e16;
    }

    button:disabled {
      background: #4b5563;
      color: #d1d5db;
      cursor: not-allowed;
    }

    .secondary {
      background: linear-gradient(90deg, #f59e0b, #f97316);
      color: #3f1d02;
    }

    .upload-preview {
      margin-top: 12px;
      border: 1px dashed #6b7280;
      border-radius: 10px;
      padding: 12px;
      background: rgba(17, 24, 39, 0.7);
    }

    .result {
      margin-top: 12px;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid;
    }

    .real {
      background: rgba(20, 83, 45, 0.35);
      border-color: #22c55e;
      color: #dcfce7;
    }

    .fake {
      background: rgba(127, 29, 29, 0.35);
      border-color: #ef4444;
      color: #fee2e2;
    }

    .error {
      background: rgba(127, 29, 29, 0.3);
      border: 1px solid #f87171;
      color: #fee2e2;
    }

    .meta {
      color: #d1d5db;
      margin-top: 6px;
      font-size: 14px;
    }

    audio { width: 100%; margin-top: 12px; }

    .muted { color: #9ca3af; font-size: 13px; }

    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 4px 10px;
      background: #0f766e;
      color: #ccfbf1;
      margin-bottom: 10px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  {% raw %}
  <script type="text/babel">
    const { useEffect, useState } = React;

    function App() {
      const [file, setFile] = useState(null);
      const [localAudioPreview, setLocalAudioPreview] = useState('');
      const [audioUrlInput, setAudioUrlInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      useEffect(() => {
        if (!file) {
          setLocalAudioPreview('');
          return;
        }

        const objectUrl = URL.createObjectURL(file);
        setLocalAudioPreview(objectUrl);

        return () => {
          URL.revokeObjectURL(objectUrl);
        };
      }, [file]);

      const clearMessages = () => {
        setError('');
        setResult(null);
      };

      const analyzeUpload = async () => {
        if (!file) {
          setError('Please choose an audio file first.');
          return;
        }

        clearMessages();
        setLoading(true);

        try {
          const formData = new FormData();
          formData.append('audio', file);

          const response = await fetch('/predict', {
            method: 'POST',
            body: formData,
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Prediction failed');
          setResult(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const analyzeFromUrl = async () => {
        if (!audioUrlInput.trim()) {
          setError('Please paste an audio URL.');
          return;
        }

        clearMessages();
        setLoading(true);

        try {
          const response = await fetch('/predict-url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audioUrl: audioUrlInput.trim() }),
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Prediction failed');
          setResult(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="app-shell">
          <div className="hero">
            <div className="badge">Flask + React</div>
            <h1 className="title">Audio Deepfake Detector</h1>
            <p className="subtitle">New layout with instant upload playback, URL analysis, and improved result panel.</p>
          </div>

          <div className="grid">
            <div className="card">
              <h3>Input Panel</h3>

              <div className="section">
                <h3>Upload Audio</h3>
                <div className="row">
                  <input
                    type="file"
                    accept=".wav,.mp3,.ogg,.flac,.m4a,.opus"
                    onChange={(e) => setFile(e.target.files?.[0] || null)}
                  />
                  <button onClick={analyzeUpload} disabled={loading || !file}>Analyze Upload</button>
                </div>

                {file && (
                  <>
                    <div className="meta">Selected: {file.name}</div>
                    <div className="upload-preview">
                      <div className="muted">Preview before analysis:</div>
                      <audio controls src={localAudioPreview}></audio>
                    </div>
                  </>
                )}
              </div>

              <div className="section">
                <h3>Paste Audio URL</h3>
                <div className="row">
                  <input
                    type="text"
                    placeholder="https://example.com/audio.mp3"
                    value={audioUrlInput}
                    onChange={(e) => setAudioUrlInput(e.target.value)}
                  />
                  <button className="secondary" onClick={analyzeFromUrl} disabled={loading}>Analyze URL</button>
                </div>
                <div className="muted">Supports direct http/https links to audio files.</div>
              </div>
            </div>

            <div className="card">
              <h3>Result Panel</h3>
              {loading && <div className="meta">Analyzing audio...</div>}

              {error && (
                <div className="result error" style={{ marginTop: '14px' }}>
                  {error}
                </div>
              )}

              {!loading && !error && !result && (
                <div className="section">
                  <div className="muted">No result yet. Upload audio or paste URL to begin analysis.</div>
                </div>
              )}

              {result && (
                <div className={`result ${result.is_real ? 'real' : 'fake'}`}>
                  <strong>{result.prediction}</strong>
                  <div className="meta">Confidence: {(result.confidence * 100).toFixed(2)}%</div>
                  <div className="meta">Model: {result.model}</div>
                  <div className="meta">File: {result.file_name}</div>
                  <div className="muted">Playback of analyzed audio:</div>
                  <audio controls src={result.file_url}></audio>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  {% endraw %}
</body>
</html>
